# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "4b0b18e4abb15c4a75683c7fc32d2b44"
name = "fabricvton"
application_url = "https://fabricvton-api.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [webhooks.privacy_compliance]
  customer_data_request_url = "/webhooks/customers/data_request"
  customer_deletion_url = "/webhooks/customers/redact"
  shop_deletion_url = "/webhooks/shop/redact"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,read_files,read_orders,read_products,read_themes,write_files,write_script_tags,write_themes"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://fabricvton-api.onrender.com/auth/callback",
  "https://fabricvton-api.onrender.com/auth/shopify/callback",
  "https://fabricvton-api.onrender.com/api/auth/callback"
]

[app_proxy]
url = "https://fabricvton-api.onrender.com/proxy"
subpath = "fabricvton"
prefix = "apps"

[pos]
embedded = true
